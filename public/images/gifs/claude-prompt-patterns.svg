<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes typeTag {
      from { width: 0; }
      to { width: 100%; }
    }
    .bg { fill: #1a1a2e; }
    .tag { fill: #e2777a; font-family: 'Menlo', 'Monaco', monospace; font-size: 15px; }
    .attr { fill: #7ec8e3; font-family: 'Menlo', 'Monaco', monospace; font-size: 15px; }
    .text { fill: #c8d6e5; font-family: 'Menlo', 'Monaco', monospace; font-size: 14px; }
    .comment { fill: #636e7b; font-family: 'Menlo', 'Monaco', monospace; font-size: 13px; font-style: italic; }
    .title-text { fill: #ffffff; font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 22px; font-weight: 600; letter-spacing: 0.5px; }
    .subtitle { fill: #8892a0; font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 13px; }
    .line1 { animation: fadeUp 0.5s ease both 0.2s; }
    .line2 { animation: fadeUp 0.5s ease both 0.6s; }
    .line3 { animation: fadeUp 0.5s ease both 1.0s; }
    .line4 { animation: fadeUp 0.5s ease both 1.4s; }
    .line5 { animation: fadeUp 0.5s ease both 1.8s; }
    .line6 { animation: fadeUp 0.5s ease both 2.2s; }
    .line7 { animation: fadeUp 0.5s ease both 2.6s; }
    .line8 { animation: fadeUp 0.5s ease both 3.0s; }
    .cursor { animation: blink 1s step-end infinite 3.2s; fill: #e2777a; }
    .glow { filter: drop-shadow(0 0 6px rgba(126, 200, 227, 0.3)); }
  </style>

  <rect class="bg" width="640" height="400" rx="8"/>

  <!-- Window dots -->
  <circle cx="24" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="20" r="6" fill="#febc2e"/>
  <circle cx="64" cy="20" r="6" fill="#28c840"/>

  <!-- Title area -->
  <text class="title-text" x="320" y="62" text-anchor="middle">Claude Prompt Patterns</text>
  <line x1="200" y1="76" x2="440" y2="76" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Code block background -->
  <rect x="40" y="92" width="560" height="272" rx="6" fill="#12122a" opacity="0.6"/>

  <!-- Animated code lines -->
  <g class="line1 glow">
    <text class="comment" x="60" y="122">&lt;!-- Structure with XML tags --&gt;</text>
  </g>

  <g class="line2">
    <text class="tag" x="60" y="152">&lt;context&gt;</text>
  </g>

  <g class="line3">
    <text class="text" x="84" y="177">You are a coding assistant.</text>
  </g>

  <g class="line4">
    <text class="tag" x="60" y="202">&lt;/context&gt;</text>
  </g>

  <g class="line5">
    <text x="60" y="232"><tspan class="tag">&lt;task</tspan><tspan class="attr"> format</tspan><tspan class="tag">=</tspan><tspan class="text">"json"</tspan><tspan class="tag">&gt;</tspan></text>
  </g>

  <g class="line6">
    <text class="text" x="84" y="257">Explain why, not just what.</text>
  </g>

  <g class="line7">
    <text class="tag" x="60" y="282">&lt;/task&gt;</text>
  </g>

  <g class="line8">
    <text class="comment" x="60" y="312">&lt;!-- Positive framing &gt; negation --&gt;</text>
  </g>

  <!-- Blinking cursor -->
  <rect class="cursor" x="340" y="300" width="8" height="16" rx="1"/>

  <!-- Subtle bottom label -->
  <text class="subtitle" x="320" y="384" text-anchor="middle">Best practices for effective prompts</text>
</svg>
