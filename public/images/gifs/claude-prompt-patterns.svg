<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <style>
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes wiggle { 0%,100% { transform: rotate(0deg); } 25% { transform: rotate(-5deg); } 75% { transform: rotate(5deg); } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes blink { 0%,42%,46%,100% { ry: 7; } 44% { ry: 1.5; } }
    @keyframes sparkle { 0%,100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1); } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes nod { 0%,100% { transform: translateY(0) rotate(0); } 30% { transform: translateY(3px) rotate(2deg); } 60% { transform: translateY(1px) rotate(-1deg); } }

    .bg { fill: #faf3eb; }
    .title { fill: #3d3535; font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 20px; font-weight: 700; }
    .subtitle { fill: #8a7f7f; font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 13px; }

    .claude { animation: float 3s ease-in-out infinite; }
    .claude-nod { animation: nod 2s ease-in-out infinite 1s; transform-origin: 130px 180px; }

    .tag1 { animation: slideIn 0.4s ease both 0.5s; }
    .tag2 { animation: slideIn 0.4s ease both 1.0s; }
    .tag3 { animation: slideIn 0.4s ease both 1.5s; }
    .tag4 { animation: slideIn 0.4s ease both 2.0s; }

    .tag-bounce1 { animation: bounce 2.5s ease-in-out infinite 0.8s; }
    .tag-bounce2 { animation: bounce 2.5s ease-in-out infinite 1.3s; }
    .tag-bounce3 { animation: bounce 2.5s ease-in-out infinite 1.8s; }
    .tag-bounce4 { animation: bounce 2.5s ease-in-out infinite 2.3s; }

    .speech { animation: popIn 0.5s ease both 2.5s; transform-origin: 320px 80px; }
    .heart { animation: popIn 0.4s ease both 2.8s; transform-origin: 195px 140px; }

    .sparkle1 { animation: sparkle 1.5s ease-in-out infinite 2.5s; }
    .sparkle2 { animation: sparkle 1.5s ease-in-out infinite 3.0s; }
    .sparkle3 { animation: sparkle 1.5s ease-in-out infinite 3.5s; }
  </style>

  <rect class="bg" width="640" height="400" rx="12"/>

  <!-- Title -->
  <text class="title" x="320" y="38" text-anchor="middle">Claude Prompt Patterns</text>

  <!-- Claude robot (left side) -->
  <g class="claude">
    <g class="claude-nod">
      <!-- Antenna -->
      <line x1="130" y1="108" x2="130" y2="86" stroke="#d4a84b" stroke-width="3" stroke-linecap="round"/>
      <circle cx="130" cy="80" r="7" fill="#f5c542" stroke="#e0b030" stroke-width="1.5"/>
      <!-- Ear bolts -->
      <circle cx="66" cy="155" r="8" fill="#d4a84b" stroke="#b8922f" stroke-width="1.5"/>
      <circle cx="66" cy="155" r="3" fill="#b8922f"/>
      <circle cx="194" cy="155" r="8" fill="#d4a84b" stroke="#b8922f" stroke-width="1.5"/>
      <circle cx="194" cy="155" r="3" fill="#b8922f"/>
      <!-- Head -->
      <rect x="74" y="108" width="112" height="90" rx="16" fill="#f0cc62" stroke="#d4a84b" stroke-width="2.5"/>
      <!-- Visor / face screen -->
      <rect x="88" y="124" width="84" height="50" rx="10" fill="#1a2a3a"/>
      <!-- Glowing eyes -->
      <circle cx="112" cy="148" r="9" fill="#4cff9f" opacity="0.25"/>
      <circle cx="112" cy="148" r="5" fill="#4cff9f"/>
      <circle cx="148" cy="148" r="9" fill="#4cff9f" opacity="0.25"/>
      <circle cx="148" cy="148" r="5" fill="#4cff9f"/>
      <!-- Mouth: LED grid -->
      <rect x="108" y="162" width="5" height="4" rx="1" fill="#4cff9f" opacity="0.8"/>
      <rect x="116" y="162" width="5" height="4" rx="1" fill="#4cff9f" opacity="0.8"/>
      <rect x="124" y="162" width="5" height="4" rx="1" fill="#4cff9f" opacity="0.8"/>
      <rect x="132" y="162" width="5" height="4" rx="1" fill="#4cff9f" opacity="0.8"/>
      <rect x="140" y="162" width="5" height="4" rx="1" fill="#4cff9f" opacity="0.8"/>
      <!-- Neck -->
      <rect x="118" y="198" width="24" height="10" rx="4" fill="#d4a84b"/>
      <!-- Body -->
      <rect x="86" y="208" width="88" height="30" rx="10" fill="#f0cc62" stroke="#d4a84b" stroke-width="2"/>
      <!-- Chest light -->
      <circle cx="130" cy="222" r="6" fill="#f6a5c0" opacity="0.7"/>
      <circle cx="130" cy="222" r="3" fill="#f6a5c0"/>
    </g>
  </g>
  <text x="130" y="256" text-anchor="middle" fill="#8a7f7f" font-family="-apple-system, sans-serif" font-size="11" font-weight="600">Claude</text>

  <!-- Heart between Claude and tags -->
  <g class="heart">
    <text x="195" y="148" font-size="18">❤️</text>
  </g>

  <!-- XML tag cards (right side, stacked) -->
  <g class="tag1">
    <g class="tag-bounce1">
      <rect x="240" y="90" width="170" height="42" rx="14" fill="#f6a5c0" stroke="#e0789a" stroke-width="2"/>
      <text x="325" y="117" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="bold">&lt;context&gt;</text>
    </g>
  </g>

  <g class="tag2">
    <g class="tag-bounce2">
      <rect x="260" y="145" width="170" height="42" rx="14" fill="#a5d8f6" stroke="#78b8e0" stroke-width="2"/>
      <text x="345" y="172" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="bold">&lt;task&gt;</text>
    </g>
  </g>

  <g class="tag3">
    <g class="tag-bounce3">
      <rect x="280" y="200" width="170" height="42" rx="14" fill="#b8e6c8" stroke="#8bc9a0" stroke-width="2"/>
      <text x="365" y="227" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="bold">&lt;rules&gt;</text>
    </g>
  </g>

  <g class="tag4">
    <g class="tag-bounce4">
      <rect x="300" y="255" width="170" height="42" rx="14" fill="#f8d49a" stroke="#e0bc78" stroke-width="2"/>
      <text x="385" y="282" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="bold">&lt;examples&gt;</text>
    </g>
  </g>

  <!-- Speech bubble from tags area -->
  <g class="speech">
    <rect x="440" y="70" width="140" height="40" rx="16" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
    <polygon points="448,110 440,124 462,110" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
    <polygon points="450,110 442,121 460,110" fill="#fff" stroke="none"/>
    <text x="510" y="96" text-anchor="middle" fill="#4caf50" font-family="-apple-system, sans-serif" font-size="14" font-weight="700">Structured!</text>
  </g>

  <!-- Sparkles -->
  <g class="sparkle1"><text x="540" y="60" font-size="16">✨</text></g>
  <g class="sparkle2"><text x="490" y="250" font-size="14">✨</text></g>
  <g class="sparkle3"><text x="220" y="80" font-size="12">✨</text></g>

  <!-- Tip cards at bottom -->
  <g style="animation: popIn 0.4s ease both 2.8s; transform-origin: 160px 340px;">
    <rect x="50" y="310" width="160" height="50" rx="12" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
    <text x="130" y="332" text-anchor="middle" fill="#3d3535" font-family="-apple-system, sans-serif" font-size="11" font-weight="600">Say what TO do</text>
    <text x="130" y="348" text-anchor="middle" fill="#4caf50" font-family="-apple-system, sans-serif" font-size="18">👍</text>
  </g>

  <g style="animation: popIn 0.4s ease both 3.1s; transform-origin: 330px 340px;">
    <rect x="240" y="310" width="160" height="50" rx="12" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
    <text x="320" y="332" text-anchor="middle" fill="#3d3535" font-family="-apple-system, sans-serif" font-size="11" font-weight="600">Explain the why</text>
    <text x="320" y="348" text-anchor="middle" fill="#3d3535" font-family="-apple-system, sans-serif" font-size="18">💡</text>
  </g>

  <g style="animation: popIn 0.4s ease both 3.4s; transform-origin: 510px 340px;">
    <rect x="430" y="310" width="160" height="50" rx="12" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
    <text x="510" y="332" text-anchor="middle" fill="#3d3535" font-family="-apple-system, sans-serif" font-size="11" font-weight="600">Show examples</text>
    <text x="510" y="348" text-anchor="middle" fill="#3d3535" font-family="-apple-system, sans-serif" font-size="18">📝</text>
  </g>

  <!-- Bottom subtitle -->
  <text class="subtitle" x="320" y="390" text-anchor="middle">Best practices for effective prompts</text>
</svg>
