<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f2ede4;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }

  /* Grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
    background-size: 180px;
    pointer-events: none;
    opacity: 0.55;
    mix-blend-mode: multiply;
  }

  .scene {
    position: relative;
    width: 480px;
    height: 300px;
  }

  /* Rough ground line — drawn as SVG squiggle */
  .ground {
    position: absolute;
    bottom: 52px;
    left: 0;
    right: 0;
  }

  /* Door wrappers */
  .door-wrap {
    position: absolute;
    bottom: 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .door-wrap.left  { left: 52px; }
  .door-wrap.right { right: 52px; }

  .door-label {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: #b07d5a;
    letter-spacing: 0.3px;
    background: #ede8de;
    border: 1.5px solid #c9a87c;
    border-radius: 3px;
    padding: 2px 6px;
  }

  /* Hand-drawn door frame via SVG filter */
  .door-frame {
    width: 78px;
    height: 124px;
    position: relative;
    filter: url(#wobbly);
  }

  .door-border {
    position: absolute;
    inset: 0;
    border: 3px solid #5c3d1e;
    border-bottom: none;
    background: #e8ddd0;
  }

  .door-panel {
    position: absolute;
    inset: 3px;
    bottom: 0;
    background: #c17f4a;
    transform-origin: left center;
  }

  /* Right door opens when walker arrives, closes after */
  .door-wrap.right .door-panel {
    background: #a86a36;
    transform-origin: right center;
    animation: doorSwing 5s cubic-bezier(0.45,0.05,0.55,0.95) infinite;
  }

  .door-wrap.right .door-knob {
    right: auto;
    left: 11px;
  }

  @keyframes doorSwing {
    0%   { transform: perspective(180px) rotateY(0deg); }
    62%  { transform: perspective(180px) rotateY(0deg); }
    72%  { transform: perspective(180px) rotateY(68deg); }
    82%  { transform: perspective(180px) rotateY(68deg); }
    94%  { transform: perspective(180px) rotateY(0deg); }
    100% { transform: perspective(180px) rotateY(0deg); }
  }

  /* Door knob */
  .door-knob {
    position: absolute;
    right: 11px;
    top: 52%;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #5c3d1e;
    border: 1.5px solid #3a2510;
  }

  /* Sticky note on left door */
  .note {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%) rotate(3deg);
    background: #fff9c2;
    border: 1.5px solid #e8d84a;
    padding: 5px 7px;
    width: 68px;
    font-size: 11px;
    line-height: 1.5;
    color: #4a3a00;
    font-family: 'Courier New', monospace;
    box-shadow: 2px 3px 0px #d4c73a44;
    z-index: 20;
    text-align: center;
    opacity: 0;
    animation: noteAppear 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.4s forwards;
  }

  @keyframes noteAppear {
    from { opacity: 0; transform: translateX(-50%) rotate(3deg) scale(0.7) translateY(4px); }
    to   { opacity: 1; transform: translateX(-50%) rotate(3deg) scale(1) translateY(0); }
  }

  /* Walker */
  .walker {
    position: absolute;
    bottom: 64px;
    font-size: 26px;
    animation: walk 5s cubic-bezier(0.45,0.05,0.55,0.95) infinite;
    will-change: left, transform;
  }

  @keyframes walk {
    0%   { left: 8px;   transform: scaleX(1);  opacity: 1; }
    22%  { left: 96px;  transform: scaleX(1);  opacity: 1; }  /* arrive left door */
    38%  { left: 96px;  transform: scaleX(1);  opacity: 1; }  /* read note */
    44%  { left: 96px;  transform: scaleX(-1); opacity: 1; }  /* turn */
    68%  { left: 308px; transform: scaleX(-1); opacity: 1; }  /* arrive right door */
    78%  { left: 318px; transform: scaleX(-1); opacity: 0; }  /* go through */
    99%  { left: 8px;   transform: scaleX(1);  opacity: 0; }
    100% { left: 8px;   transform: scaleX(1);  opacity: 1; }
  }

  /* Success bubble at right door */
  .bubble {
    position: absolute;
    bottom: 200px;
    right: 34px;
    background: #d4ecd4;
    border: 2px solid #5c8f5c;
    border-radius: 10px 10px 10px 2px;
    padding: 5px 9px;
    font-size: 13px;
    color: #2d5a2d;
    font-family: 'Courier New', monospace;
    white-space: nowrap;
    opacity: 0;
    animation: bubblePop 5s ease-in-out infinite;
    filter: url(#wobbly);
  }

  @keyframes bubblePop {
    0%   { opacity: 0; transform: scale(0.85) translateY(3px); }
    65%  { opacity: 0; transform: scale(0.85) translateY(3px); }
    72%  { opacity: 1; transform: scale(1) translateY(0); }
    86%  { opacity: 1; }
    94%  { opacity: 0; }
    100% { opacity: 0; }
  }

  /* Bottom label */
  .cmd {
    position: absolute;
    bottom: 10px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    color: #9a7a5a;
    letter-spacing: 0.5px;
  }

  /* SVG wobble filter */
  svg.filters { position: absolute; width: 0; height: 0; }
</style>
</head>
<body>

<!-- Wobble filter for hand-drawn feel -->
<svg class="filters">
  <defs>
    <filter id="wobbly" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" result="noise" seed="3"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<div class="scene">

  <!-- Ground squiggle -->
  <svg class="ground" height="12" viewBox="0 0 480 12" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 6 Q20 2 40 6 Q60 10 80 6 Q100 2 120 6 Q140 10 160 6 Q180 2 200 6 Q220 10 240 6 Q260 2 280 6 Q300 10 320 6 Q340 2 360 6 Q380 10 400 6 Q420 2 440 6 Q460 10 480 6"
      stroke="#5c3d1e" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  </svg>

  <!-- Left door -->
  <div class="door-wrap left">
    <div class="door-label">feat/my-branch</div>
    <div class="door-frame">
      <div class="door-border">
        <div class="door-panel">
          <div class="door-knob"></div>
        </div>
      </div>
      <div class="note">already<br>open →<br>🚪</div>
    </div>
  </div>

  <!-- Right door (open) -->
  <div class="door-wrap right">
    <div class="door-label">feat/my-branch</div>
    <div class="door-frame">
      <div class="door-border">
        <div class="door-panel">
          <div class="door-knob"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Walker -->
  <div class="walker">🚶</div>

  <!-- Bubble -->
  <div class="bubble">✓ worktree</div>

  <div class="cmd">switch feat/my-branch</div>

</div>
</body>
</html>
