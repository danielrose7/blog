<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <style>
    @keyframes roll { 0% { transform: translateX(-300px); } 100% { transform: translateX(0); } }
    @keyframes bump { 0%,100% { transform: translateY(0); } 40% { transform: translateY(-2px); } 60% { transform: translateY(1px); } }
    @keyframes wheelSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes twinkle { 0%,100% { opacity: 0.2; } 50% { opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes dust { 0% { opacity: 0.6; transform: translateX(0) scale(1); } 100% { opacity: 0; transform: translateX(-40px) scale(2); } }

    .bg { fill: #0a0a0f; }
    .ground { fill: #1a1520; }
    .ground-line { fill: #334155; }

    .wagon-group {
      animation: roll 2s ease-out both, bump 0.8s ease-in-out infinite 2s;
    }

    .star { animation: twinkle 3s ease-in-out infinite; }

    .title-main {
      fill: #ffffff;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      animation: fadeIn 0.8s ease both 1.5s;
    }
    .title-sup {
      fill: #f59e0b;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      font-size: 14px;
      font-weight: 500;
      animation: fadeIn 0.8s ease both 1.8s;
    }
    .title-author {
      fill: #64748b;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      font-size: 14px;
      font-weight: 400;
      animation: fadeIn 0.8s ease both 2.0s;
    }

    .card1 { animation: slideUp 0.4s ease both 2.4s; }
    .card2 { animation: slideUp 0.4s ease both 2.7s; }
    .card3 { animation: slideUp 0.4s ease both 3.0s; }
    .card4 { animation: slideUp 0.4s ease both 3.3s; }
    .card-box { fill: #1e293b; stroke: #334155; stroke-width: 1; rx: 6; }
    .card-label { fill: #e0e0e8; font-family: -apple-system, sans-serif; font-size: 11px; font-weight: 500; }
    .card-icon { font-size: 14px; }

    .dust1 { animation: dust 1.5s ease-out infinite 2.2s; }
    .dust2 { animation: dust 1.5s ease-out infinite 2.5s; }
    .dust3 { animation: dust 1.8s ease-out infinite 2.8s; }
  </style>

  <rect class="bg" width="640" height="400" rx="8"/>

  <!-- Stars -->
  <rect class="star" x="45" y="30" width="2" height="2" fill="#f59e0b" opacity="0.5" style="animation-delay: 0.5s;"/>
  <rect class="star" x="120" y="55" width="2" height="2" fill="#f59e0b" opacity="0.6" style="animation-delay: 1.2s;"/>
  <rect class="star" x="200" y="20" width="2" height="2" fill="#f59e0b" opacity="0.4" style="animation-delay: 2.0s;"/>
  <rect class="star" x="340" y="40" width="2" height="2" fill="#f59e0b" opacity="0.3" style="animation-delay: 0.8s;"/>
  <rect class="star" x="450" y="25" width="2" height="2" fill="#f59e0b" opacity="0.5" style="animation-delay: 1.5s;"/>
  <rect class="star" x="530" y="50" width="2" height="2" fill="#f59e0b" opacity="0.6" style="animation-delay: 2.3s;"/>
  <rect class="star" x="580" y="18" width="2" height="2" fill="#f59e0b" opacity="0.4" style="animation-delay: 0.3s;"/>
  <rect class="star" x="75" y="80" width="2" height="2" fill="#f59e0b" opacity="0.3" style="animation-delay: 1.8s;"/>
  <rect class="star" x="490" y="70" width="2" height="2" fill="#f59e0b" opacity="0.5" style="animation-delay: 2.6s;"/>
  <rect class="star" x="290" y="65" width="2" height="2" fill="#f59e0b" opacity="0.4" style="animation-delay: 0.1s;"/>

  <!-- Ground -->
  <rect class="ground" x="0" y="240" width="640" height="160"/>
  <!-- Ground details (pixel-ish) -->
  <rect class="ground-line" x="0" y="240" width="30" height="2"/>
  <rect class="ground-line" x="60" y="240" width="50" height="2"/>
  <rect class="ground-line" x="140" y="240" width="15" height="2"/>
  <rect class="ground-line" x="200" y="240" width="70" height="2"/>
  <rect class="ground-line" x="310" y="240" width="40" height="2"/>
  <rect class="ground-line" x="400" y="240" width="20" height="2"/>
  <rect class="ground-line" x="460" y="240" width="55" height="2"/>
  <rect class="ground-line" x="560" y="240" width="80" height="2"/>

  <!-- Wagon (pixel art, scaled up) -->
  <g class="wagon-group" transform="translate(130, 80) scale(10)">
    <!-- Wagon bed -->
    <rect fill="#f59e0b" x="8" y="10" width="1" height="5"/>
    <rect fill="#f59e0b" x="9" y="11" width="10" height="4"/>
    <rect fill="#f59e0b" x="19" y="10" width="1" height="5"/>
    <!-- Cargo bumps -->
    <rect fill="#b45309" x="10" y="10" width="3" height="1"/>
    <rect fill="#b45309" x="15" y="10" width="3" height="1"/>
    <!-- Canvas cover - arched -->
    <rect fill="#f59e0b" x="9" y="4" width="1" height="7"/>
    <rect fill="#f59e0b" x="19" y="4" width="1" height="7"/>
    <rect fill="#f59e0b" x="13" y="2" width="1" height="1"/>
    <rect fill="#f59e0b" x="14" y="2" width="1" height="1"/>
    <rect fill="#f59e0b" x="15" y="2" width="1" height="1"/>
    <rect fill="#f59e0b" x="10" y="3" width="1" height="1"/>
    <rect fill="#f59e0b" x="11" y="3" width="1" height="1"/>
    <rect fill="#f59e0b" x="12" y="3" width="1" height="1"/>
    <rect fill="#f59e0b" x="16" y="3" width="1" height="1"/>
    <rect fill="#f59e0b" x="17" y="3" width="1" height="1"/>
    <rect fill="#f59e0b" x="18" y="3" width="1" height="1"/>
    <!-- Canvas fill (darker) -->
    <rect fill="#b45309" x="10" y="4" width="9" height="1" opacity="0.5"/>
    <rect fill="#b45309" x="11" y="5" width="7" height="1" opacity="0.3"/>
    <!-- Canvas ribs -->
    <rect fill="#f59e0b" x="12" y="4" width="1" height="7" opacity="0.4"/>
    <rect fill="#f59e0b" x="16" y="4" width="1" height="7" opacity="0.4"/>
    <!-- Tongue/hitch -->
    <rect fill="#f59e0b" x="6" y="13" width="2" height="1"/>
    <rect fill="#f59e0b" x="5" y="14" width="1" height="1"/>
    <!-- Front wheel -->
    <rect fill="#f59e0b" x="10" y="15" width="1" height="1"/>
    <rect fill="#f59e0b" x="12" y="15" width="1" height="1"/>
    <rect fill="#f59e0b" x="9" y="16" width="1" height="1"/>
    <rect fill="#f59e0b" x="13" y="16" width="1" height="1"/>
    <rect fill="#f59e0b" x="9" y="17" width="1" height="1"/>
    <rect fill="#f59e0b" x="13" y="17" width="1" height="1"/>
    <rect fill="#f59e0b" x="10" y="18" width="1" height="1"/>
    <rect fill="#f59e0b" x="12" y="18" width="1" height="1"/>
    <rect fill="#b45309" x="11" y="16" width="1" height="2"/>
    <!-- Rear wheel -->
    <rect fill="#f59e0b" x="16" y="15" width="1" height="1"/>
    <rect fill="#f59e0b" x="18" y="15" width="1" height="1"/>
    <rect fill="#f59e0b" x="15" y="16" width="1" height="1"/>
    <rect fill="#f59e0b" x="19" y="16" width="1" height="1"/>
    <rect fill="#f59e0b" x="15" y="17" width="1" height="1"/>
    <rect fill="#f59e0b" x="19" y="17" width="1" height="1"/>
    <rect fill="#f59e0b" x="16" y="18" width="1" height="1"/>
    <rect fill="#f59e0b" x="18" y="18" width="1" height="1"/>
    <rect fill="#b45309" x="17" y="16" width="1" height="2"/>
  </g>

  <!-- Dust particles behind wagon -->
  <circle class="dust1" cx="235" cy="236" r="3" fill="#64748b" opacity="0"/>
  <circle class="dust2" cx="230" cy="230" r="2" fill="#64748b" opacity="0"/>
  <circle class="dust3" cx="240" cy="234" r="4" fill="#64748b" opacity="0"/>

  <!-- Title text -->
  <text class="title-main" x="320" y="300" text-anchor="middle">Lessons from the Frontier</text>
  <text class="title-sup" x="526" y="288" text-anchor="start">AI</text>
  <text class="title-author" x="320" y="324" text-anchor="middle">Daniel Rose</text>

  <!-- Curate cards at bottom -->
  <g class="card1">
    <rect class="card-box" x="100" y="350" width="100" height="30" rx="6"/>
    <text x="150" y="370" text-anchor="middle"><tspan class="card-icon">🎯 </tspan><tspan class="card-label" fill="#f59e0b">Context</tspan></text>
  </g>
  <g class="card2">
    <rect class="card-box" x="215" y="350" width="100" height="30" rx="6"/>
    <text x="265" y="370" text-anchor="middle"><tspan class="card-icon">🛠 </tspan><tspan class="card-label" fill="#6ea8fe">Tools</tspan></text>
  </g>
  <g class="card3">
    <rect class="card-box" x="330" y="350" width="100" height="30" rx="6"/>
    <text x="380" y="370" text-anchor="middle"><tspan class="card-icon">🔄 </tspan><tspan class="card-label" fill="#4ade80">Workflow</tspan></text>
  </g>
  <g class="card4">
    <rect class="card-box" x="445" y="350" width="100" height="30" rx="6"/>
    <text x="495" y="370" text-anchor="middle"><tspan class="card-icon">📦 </tspan><tspan class="card-label" fill="#fb7185">Output</tspan></text>
  </g>
</svg>
