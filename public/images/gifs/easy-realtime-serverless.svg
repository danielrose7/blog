<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <path id="p1" d="M 180,193 C 228,165 262,132 268,122"/>
    <path id="p2" d="M 372,122 C 378,132 412,165 460,193"/>
  </defs>

  <style>
    @keyframes float    { 0%,100%{transform:translateY(0)}   50%{transform:translateY(-7px)} }
    @keyframes cloudBob { 0%,100%{transform:translateY(0)}   50%{transform:translateY(-5px)} }
    @keyframes blink    { 0%,48%,52%,100%{opacity:1}         50%{opacity:0} }
    @keyframes sparkle  { 0%,100%{opacity:0;transform:scale(.5)} 50%{opacity:1;transform:scale(1)} }
    @keyframes glow     { 0%,100%{opacity:.1}                50%{opacity:.45} }

    .bg      { fill:#faf3eb }
    .title   { fill:#3d3535; font-family:-apple-system,'Helvetica Neue',sans-serif; font-size:20px; font-weight:700 }
    .lbl     { fill:#3d3535; font-family:-apple-system,'Helvetica Neue',sans-serif; font-size:12px; font-weight:600 }
    .arc-lbl { fill:#b8aeae; font-family:-apple-system,'Helvetica Neue',sans-serif; font-size:10px }

    .dev-l   { animation:float    3.2s ease-in-out infinite }
    .dev-r   { animation:float    3.2s ease-in-out infinite 1.1s }
    .cloud-g { animation:cloudBob 4s   ease-in-out infinite 0.6s }
    .cursor  { animation:blink    1s   step-end    infinite }
    .sp1     { animation:sparkle  1.6s ease-in-out infinite 2.4s }
    .sp2     { animation:sparkle  1.6s ease-in-out infinite 3.2s }
    .s-glow  { animation:glow     2.4s ease-in-out infinite 1.6s }
  </style>

  <rect class="bg" width="640" height="400" rx="12"/>

  <!-- ── DOTTED ARC GUIDES ── -->
  <path d="M 180,193 C 228,165 262,132 268,122" fill="none" stroke="#e0789a" stroke-width="1.5" stroke-dasharray="4 5" opacity=".3"/>
  <path d="M 372,122 C 378,132 412,165 460,193" fill="none" stroke="#8bc9a0" stroke-width="1.5" stroke-dasharray="4 5" opacity=".3"/>

  <!-- ── LEFT DEVICE ── -->
  <g class="dev-l">
    <!-- screen body -->
    <rect x="48"  y="150" width="132" height="90" rx="10" fill="#f6a5c0" stroke="#e0789a" stroke-width="2.5"/>
    <!-- inner display -->
    <rect x="58"  y="159" width="112" height="72" rx="5"  fill="#1a2a3a"/>
    <!-- title bar -->
    <rect x="61"  y="162" width="106" height="13" rx="3"  fill="#2d3f52"/>
    <text x="114" y="172" text-anchor="middle" fill="#a5d8f6" font-family="-apple-system,sans-serif" font-size="7.5" font-weight="600">Tote</text>
    <!-- traffic lights -->
    <circle cx="68"  cy="168" r="2.5" fill="#ff6b6b" opacity=".8"/>
    <circle cx="75"  cy="168" r="2.5" fill="#ffd166" opacity=".8"/>
    <circle cx="82"  cy="168" r="2.5" fill="#4cff9f" opacity=".8"/>
    <!-- list rows -->
    <rect x="63"  y="180" width="78" height="8"  rx="2" fill="#78b8e0" opacity=".55"/>
    <rect x="63"  y="192" width="56" height="8"  rx="2" fill="#78b8e0" opacity=".35"/>
    <!-- input row -->
    <rect x="63"  y="204" width="98" height="14" rx="3" fill="#2d3f52" stroke="#f6a5c0" stroke-width="1.2"/>
    <text x="68"  y="213.5" fill="#f8d49a" font-family="monospace" font-size="7.5">new item</text>
    <rect class="cursor" x="114" y="207" width="1.5" height="8" fill="#f8d49a"/>
    <!-- keyboard -->
    <rect x="42"  y="242" width="144" height="14" rx="5" fill="#f6a5c0" stroke="#e0789a" stroke-width="2"/>
    <rect x="99"  y="246" width="30"  height="6"  rx="3" fill="#e0789a" opacity=".3"/>
  </g>
  <text class="lbl" x="114" y="272" text-anchor="middle">your device</text>

  <!-- arc labels -->
  <text class="arc-lbl" x="212" y="153" text-anchor="middle">push</text>
  <text class="arc-lbl" x="428" y="153" text-anchor="middle">sync</text>

  <!-- ── CLOUD ── -->
  <g class="cloud-g">
    <circle cx="291" cy="118" r="27" fill="#a5d8f6"/>
    <circle cx="315" cy="103" r="25" fill="#a5d8f6"/>
    <circle cx="342" cy="105" r="23" fill="#a5d8f6"/>
    <circle cx="363" cy="117" r="26" fill="#a5d8f6"/>
    <!-- base fill -->
    <rect x="264" y="118" width="125" height="26" fill="#a5d8f6"/>
    <rect x="264" y="136" width="125" height="10" rx="5" fill="#78b8e0" opacity=".25"/>
    <!-- soft border on puffs -->
    <circle cx="291" cy="118" r="27" fill="none" stroke="#78b8e0" stroke-width="1.5" opacity=".4"/>
    <circle cx="315" cy="103" r="25" fill="none" stroke="#78b8e0" stroke-width="1.5" opacity=".4"/>
    <circle cx="342" cy="105" r="23" fill="none" stroke="#78b8e0" stroke-width="1.5" opacity=".4"/>
    <circle cx="363" cy="117" r="26" fill="none" stroke="#78b8e0" stroke-width="1.5" opacity=".4"/>
    <!-- labels -->
    <text x="317" y="124" text-anchor="middle" fill="#2a5878" font-family="-apple-system,sans-serif" font-size="9" font-weight="700">Neon + Ably</text>
    <text x="317" y="137" text-anchor="middle" fill="#2a5878" font-family="monospace" font-size="7.5">pg_notify</text>
  </g>
  <text x="317" y="168" text-anchor="middle" fill="#b0a8a8" font-family="-apple-system,sans-serif" font-size="9.5">transactional outbox</text>

  <!-- ── ANIMATED PACKETS ── -->
  <!-- pink: left → cloud -->
  <circle r="7" fill="#f6a5c0" stroke="#e0789a" stroke-width="1.5">
    <animateMotion dur="1.6s" repeatCount="indefinite" begin="0s" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.6 1">
      <mpath href="#p1"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="1.6s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <!-- green: cloud → right -->
  <circle r="7" fill="#b8e6c8" stroke="#8bc9a0" stroke-width="1.5">
    <animateMotion dur="1.6s" repeatCount="indefinite" begin="0.8s" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.6 1">
      <mpath href="#p2"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="1.6s" repeatCount="indefinite" begin="0.8s"/>
  </circle>

  <!-- ── RIGHT DEVICE ── -->
  <g class="dev-r">
    <!-- screen body -->
    <rect x="460" y="150" width="132" height="90" rx="10" fill="#b8e6c8" stroke="#8bc9a0" stroke-width="2.5"/>
    <!-- inner display -->
    <rect x="470" y="159" width="112" height="72" rx="5"  fill="#1a2a3a"/>
    <!-- green glow (pulses on update) -->
    <rect class="s-glow" x="470" y="159" width="112" height="72" rx="5" fill="#4cff9f"/>
    <!-- title bar -->
    <rect x="473" y="162" width="106" height="13" rx="3"  fill="#2d3f52"/>
    <text x="526" y="172" text-anchor="middle" fill="#a5d8f6" font-family="-apple-system,sans-serif" font-size="7.5" font-weight="600">Tote</text>
    <!-- traffic lights -->
    <circle cx="480" cy="168" r="2.5" fill="#ff6b6b" opacity=".8"/>
    <circle cx="487" cy="168" r="2.5" fill="#ffd166" opacity=".8"/>
    <circle cx="494" cy="168" r="2.5" fill="#4cff9f" opacity=".8"/>
    <!-- same list rows -->
    <rect x="475" y="180" width="78" height="8"  rx="2" fill="#78b8e0" opacity=".55"/>
    <rect x="475" y="192" width="56" height="8"  rx="2" fill="#78b8e0" opacity=".35"/>
    <!-- new item appearing -->
    <rect x="475" y="204" width="78" height="8" rx="2" fill="#4cff9f">
      <animate attributeName="opacity" values=".1;.1;.75;.75;.1" keyTimes="0;0.3;0.55;0.85;1" dur="3.2s" repeatCount="indefinite" begin="1.6s"/>
    </rect>
    <!-- live badge -->
    <rect x="557" y="201" width="22" height="12" rx="6" fill="#4caf50">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.3;0.55;0.85;1" dur="3.2s" repeatCount="indefinite" begin="1.6s"/>
    </rect>
    <text x="568" y="210" text-anchor="middle" fill="#fff" font-family="-apple-system,sans-serif" font-size="7" font-weight="700">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.3;0.55;0.85;1" dur="3.2s" repeatCount="indefinite" begin="1.6s"/>
      live
    </text>
    <!-- keyboard -->
    <rect x="454" y="242" width="144" height="14" rx="5" fill="#b8e6c8" stroke="#8bc9a0" stroke-width="2"/>
    <rect x="511" y="246" width="30"  height="6"  rx="3" fill="#8bc9a0" opacity=".3"/>
  </g>
  <text class="lbl" x="526" y="272" text-anchor="middle">their device</text>

  <!-- ── SPARKLES ── -->
  <g class="sp1"><text x="200" y="86"  font-size="16">✨</text></g>
  <g class="sp2"><text x="418" y="80"  font-size="14">✨</text></g>

</svg>
