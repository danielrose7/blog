<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <style>
    @keyframes pressDown {
      0%,15%   { transform: translateY(0); }
      42%,60%  { transform: translateY(23px); }
      85%,100% { transform: translateY(0); }
    }
    @keyframes handlePull {
      0%,15%   { transform: rotate(0deg); }
      42%,60%  { transform: rotate(26deg); }
      85%,100% { transform: rotate(0deg); }
    }
    @keyframes inkStamp {
      0%,42%   { opacity: 0; }
      60%,86%  { opacity: 1; }
      100%     { opacity: 0; }
    }
    @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
    @keyframes robotBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes eyeGlow  { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .robot   { animation: robotBob 2.5s ease-in-out infinite 0.8s; transform-origin: 545px 222px; }
    .eye-glow { animation: eyeGlow 1.8s ease-in-out infinite; }

    .platen-group { animation: pressDown 5s ease-in-out infinite; }
    .handle       { animation: handlePull 5s ease-in-out infinite; transform-origin: 309px 100px; }
    .ink-text     { animation: inkStamp 5s ease-in-out infinite; }

  </style>

  <rect width="640" height="400" rx="8" fill="#faf3eb"/>

  <!-- ── FRAME (static) ── -->

  <!-- Left upright -->
  <rect x="200" y="48" width="26" height="212" fill="#78350f"/>
  <rect x="204" y="48" width="5"  height="212" fill="#92400e" opacity="0.4"/>

  <!-- Right upright -->
  <rect x="414" y="48" width="26" height="212" fill="#78350f"/>
  <rect x="418" y="48" width="5"  height="212" fill="#92400e" opacity="0.4"/>

  <!-- Top beam -->
  <rect x="182" y="42" width="276" height="26" fill="#92400e"/>
  <rect x="182" y="42" width="276" height="7"  fill="#b45309" opacity="0.4"/>
  <!-- Top caps -->
  <rect x="178" y="36" width="34" height="10" fill="#b45309"/>
  <rect x="428" y="36" width="34" height="10" fill="#b45309"/>

  <!-- Base beam -->
  <rect x="182" y="250" width="276" height="24" fill="#92400e"/>
  <rect x="182" y="270" width="276" height="4"  fill="#6b2d04"/>
  <!-- Base feet -->
  <rect x="190" y="260" width="34" height="18" fill="#b45309"/>
  <rect x="416" y="260" width="34" height="18" fill="#b45309"/>

  <!-- ── TYPE BED (static) ── -->
  <rect x="226" y="220" width="188" height="22" fill="#1c1917"/>
  <rect x="226" y="220" width="188" height="5"  fill="#292524"/>
  <!-- Moveable type blocks -->
  <rect x="232" y="227" width="7"  height="10" fill="#292524"/>
  <rect x="241" y="227" width="10" height="10" fill="#292524"/>
  <rect x="253" y="227" width="5"  height="10" fill="#292524"/>
  <rect x="260" y="227" width="12" height="10" fill="#292524"/>
  <rect x="274" y="227" width="7"  height="10" fill="#292524"/>
  <rect x="283" y="227" width="9"  height="10" fill="#292524"/>
  <rect x="294" y="227" width="5"  height="10" fill="#292524"/>
  <rect x="301" y="227" width="12" height="10" fill="#292524"/>
  <rect x="315" y="227" width="7"  height="10" fill="#292524"/>
  <rect x="324" y="227" width="5"  height="10" fill="#292524"/>
  <rect x="331" y="227" width="9"  height="10" fill="#292524"/>
  <rect x="342" y="227" width="12" height="10" fill="#292524"/>
  <rect x="356" y="227" width="7"  height="10" fill="#292524"/>
  <rect x="365" y="227" width="9"  height="10" fill="#292524"/>
  <rect x="376" y="227" width="5"  height="10" fill="#292524"/>
  <rect x="383" y="227" width="12" height="10" fill="#292524"/>
  <rect x="397" y="227" width="7"  height="10" fill="#292524"/>
  <rect x="406" y="227" width="4"  height="10" fill="#292524"/>

  <!-- ── PAPER ── -->
  <rect x="232" y="204" width="176" height="17" fill="#fef9ec"/>
  <text class="ink-text" x="246" y="216" fill="#1c1917" font-family="monospace" font-size="10" font-weight="600">Invoice 1234.pdf</text>

  <!-- ── MOVING: lower screw section + platen ── -->
  <g class="platen-group">
    <!-- Lower screw column (slides down, hidden under upper screw) -->
    <rect x="309" y="138" width="22" height="48" fill="#57534e"/>
    <rect x="309" y="142" width="22" height="4" fill="#6b6560" opacity="0.65"/>
    <rect x="309" y="150" width="22" height="4" fill="#6b6560" opacity="0.65"/>
    <rect x="309" y="158" width="22" height="4" fill="#6b6560" opacity="0.65"/>
    <rect x="309" y="166" width="22" height="4" fill="#6b6560" opacity="0.65"/>
    <rect x="309" y="174" width="22" height="4" fill="#6b6560" opacity="0.65"/>
    <rect x="309" y="182" width="22" height="4" fill="#6b6560" opacity="0.65"/>
    <!-- Platen -->
    <rect x="226" y="186" width="188" height="18" fill="#78716c"/>
    <rect x="226" y="186" width="188" height="5"  fill="#a8a29e" opacity="0.5"/>
    <!-- Platen side brackets -->
    <rect x="226" y="186" width="18" height="30" fill="#6b6560"/>
    <rect x="396" y="186" width="18" height="30" fill="#6b6560"/>
  </g>

  <!-- ── UPPER SCREW (static, renders over lower to mask the seam) ── -->
  <rect x="309" y="68" width="22" height="76" fill="#57534e"/>
  <rect x="309" y="72"  width="22" height="4" fill="#6b6560" opacity="0.65"/>
  <rect x="309" y="80"  width="22" height="4" fill="#6b6560" opacity="0.65"/>
  <rect x="309" y="88"  width="22" height="4" fill="#6b6560" opacity="0.65"/>
  <rect x="309" y="96"  width="22" height="4" fill="#6b6560" opacity="0.65"/>
  <rect x="309" y="104" width="22" height="4" fill="#6b6560" opacity="0.65"/>
  <rect x="309" y="112" width="22" height="4" fill="#6b6560" opacity="0.65"/>
  <rect x="309" y="120" width="22" height="4" fill="#6b6560" opacity="0.65"/>
  <rect x="309" y="128" width="22" height="4" fill="#6b6560" opacity="0.65"/>
  <rect x="309" y="136" width="22" height="4" fill="#6b6560" opacity="0.65"/>

  <!-- ── HANDLE ── -->
  <g class="handle">
    <rect x="236" y="93" width="174" height="14" fill="#b45309" rx="5"/>
    <!-- Grip at right end -->
    <rect x="398" y="78" width="14" height="44" fill="#92400e" rx="4"/>
  </g>

  <!-- ── ROBOT (right side, receiving the printed PDF) ── -->
  <g class="robot">
    <!-- Antenna -->
    <line x1="545" y1="183" x2="545" y2="171" stroke="#d4a84b" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="545" cy="166" r="6" fill="#f5c542" stroke="#e0b030" stroke-width="1.5"/>
    <!-- Ear bolts -->
    <circle cx="525" cy="197" r="5" fill="#d4a84b" stroke="#b8922f" stroke-width="1.5"/>
    <circle cx="525" cy="197" r="2" fill="#b8922f"/>
    <circle cx="565" cy="197" r="5" fill="#d4a84b" stroke="#b8922f" stroke-width="1.5"/>
    <circle cx="565" cy="197" r="2" fill="#b8922f"/>
    <!-- Head -->
    <rect x="530" y="183" width="30" height="26" rx="7" fill="#f0cc62" stroke="#d4a84b" stroke-width="2"/>
    <!-- Visor -->
    <rect x="536" y="189" width="18" height="13" rx="3" fill="#1a2a3a"/>
    <!-- Eyes -->
    <circle class="eye-glow" cx="541" cy="196" r="3" fill="#4cff9f"/>
    <circle class="eye-glow" cx="550" cy="196" r="3" fill="#4cff9f" style="animation-delay: 0.3s;"/>
    <!-- Neck -->
    <rect x="541" y="209" width="8" height="6" rx="2" fill="#d4a84b"/>
    <!-- Body -->
    <rect x="532" y="215" width="26" height="22" rx="6" fill="#f0cc62" stroke="#d4a84b" stroke-width="2"/>
    <!-- Chest light -->
    <circle cx="545" cy="224" r="4" fill="#f6a5c0" opacity="0.8"/>
    <circle cx="545" cy="224" r="2" fill="#f6a5c0"/>
    <!-- Left arm -->
    <rect x="516" y="217" width="16" height="8" rx="3" fill="#d4a84b"/>
    <!-- Right arm (extended, holding paper) -->
    <rect x="558" y="217" width="16" height="8" rx="3" fill="#d4a84b"/>
    <!-- Legs -->
    <rect x="535" y="237" width="9" height="12" rx="3" fill="#d4a84b"/>
    <rect x="546" y="237" width="9" height="12" rx="3" fill="#d4a84b"/>
    <!-- Printed paper in hand -->
    <rect x="573" y="209" width="22" height="18" rx="2" fill="#fef9ec" stroke="#ddd9cc" stroke-width="1"/>
    <text x="576" y="220" fill="#1c1917" font-family="monospace" font-size="6.5" font-weight="700">PDF</text>
    <rect x="576" y="222" width="15" height="2" rx="1" fill="#c8c4b8"/>
  </g>

</svg>
